name: Build APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK (Unsigned)
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$STORE_PASSWORD" ]; then
            # Decode keystore from secret
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
            ./gradlew assembleRelease --stacktrace
          else
            echo "⚠️ No signing config — skipping release build"
          fi
        continue-on-error: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: genshin-vulkan-tool-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          compression-level: 6

      - name: Upload Release APK
        if: hashFiles('app/build/outputs/apk/release/app-release.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: genshin-vulkan-tool-release
          path: app/build/outputs/apk/release/app-release.apk
          compression-level: 6

      - name: Upload AAB (if exists)
        if: hashFiles('app/build/outputs/bundle/release/app-release.aab') != ''
        uses: actions/upload-artifact@v4
        with:
          name: genshin-vulkan-tool-aab
          path: app/build/outputs/bundle/release/app-release.aab
